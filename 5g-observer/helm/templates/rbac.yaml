apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: observer
  labels:
    app.kubernetes.io/name: 5g-observer
rules:
  # Core read access
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - nodes
      - events
      - namespaces
      - persistentvolumeclaims
      - persistentvolumes
    verbs: ["get", "list", "watch"]
  # Networking
  - apiGroups: ["k8s.cni.cncf.io"]
    resources: ["network-attachment-definitions"]
    verbs: ["get", "list", "watch"]
  # Metrics
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: observer
  labels:
    app.kubernetes.io/name: 5g-observer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: observer
subjects:
  - kind: ServiceAccount
    name: observer
    namespace: {{ .Values.namespace }}
