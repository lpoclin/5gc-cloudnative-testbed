apiVersion: apps/v1
kind: Deployment
metadata:
  name: 5g-observer-frontend
  namespace: {{ .Values.namespace }}
  labels:
    app: 5g-observer-frontend
    app.kubernetes.io/name: 5g-observer
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: 5g-observer-frontend
  template:
    metadata:
      labels:
        app: 5g-observer-frontend
        app.kubernetes.io/name: 5g-observer
    spec:
      serviceAccountName: 5g-observer
      {{- if .Values.frontend.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.frontend.nodeSelector | nindent 8 }}
      {{- end }}
      containers:
        - name: frontend
          image: {{ .Values.frontend.image }}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
