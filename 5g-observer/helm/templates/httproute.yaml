apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: 5g-observer
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: 5g-observer
spec:
  parentRefs:
    - name: 5g-observer
      namespace: {{ .Values.namespace }}
  hostnames:
    - {{ .Values.gateway.hostname | quote }}
    - {{ .Values.gateway.ip | quote }}
  rules:
    # WebSocket + API → api-server
    - matches:
        - path:
            type: PathPrefix
            value: /api/
        - path:
            type: PathPrefix
            value: /ws/
      backendRefs:
        - name: 5g-observer-api
          port: 8080
    # Everything else → frontend (SPA)
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: 5g-observer-frontend
          port: 80
